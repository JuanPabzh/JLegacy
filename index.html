<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JLegacy</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>

  <div class="scene">

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="sparkle sp1"></div>
    <div class="sparkle sp2"></div>
    <div class="sparkle sp3"></div>
    <div class="sparkle sp4"></div>
    <div class="sparkle sp5"></div>

    <div class="brand-header">
      <div class="brand-name">JLegacy</div>
      <div class="brand-line"></div>
    </div>

    <div class="selector">

      <a class="store-btn caps-btn" href="caps.html">
        <div class="glow-layer"></div>
        <div class="btn-content">
          <div class="logo-wrap">
            <div class="logo-ring"></div>
            <img src="assets/logo-caps.png" alt="JLegacy Caps">
          </div>
          <div class="store-name">
            <div class="store-title">JLegacy Caps</div>
            <div class="store-subtitle">Gorras &amp; Accesorios</div>
          </div>
          <div class="enter-cta">Entrar</div>
        </div>
      </a>

      <div class="divider"></div>

      <a class="store-btn tech-btn" href="tech.html">
        <div class="glow-layer"></div>
        <div class="btn-content">
          <div class="logo-wrap">
            <div class="logo-ring"></div>
            <img src="assets/logo-tech.png" alt="JLegacy Tech">
          </div>
          <div class="store-name">
            <div class="store-title">JLegacy Tech</div>
            <div class="store-subtitle">Dispositivos &amp; Gadgets</div>
          </div>
          <div class="enter-cta">Entrar</div>
        </div>
      </a>

    </div>

    <div class="tagline">Elige tu experiencia</div>

  </div>

  <script src="js/index.js"></script>
</body>
</html>
